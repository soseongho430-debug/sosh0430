<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dance Choreography Finder & Stager (Cloud DB Ver.)</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        :root { 
            --bg-color: #121212; 
            --card-bg: #1e1e1e; 
            --text-color: #ffffff; 
            --text-muted: #aaaaaa; 
            --accent-color: #ff4757; 
            --border-color: #333333; 
            --dancer-size: 44px;
        }
        html, body { overflow-x: hidden; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: sans-serif; margin: 0; padding: 15px; -webkit-text-size-adjust: 100%; position: relative; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; padding-right: 60px; } 
        h1 { color: var(--accent-color); font-size: 2rem; margin-bottom: 10px; }
        
        .top-nav-container { position: absolute; top: 15px; right: 15px; display: flex; align-items: center; gap: 15px; z-index: 1000; }
        .hamburger-menu { font-size: 28px; cursor: pointer; user-select: none; transition: color 0.2s; order: 2; }
        .hamburger-menu:hover { color: var(--accent-color); }
        .auth-status-area { display: flex; align-items: center; gap: 10px; order: 1; }
        .auth-btn { background: #2f3542; color: white; border: 1px solid var(--border-color); padding: 6px 14px; font-size: 0.8rem; border-radius: 6px; cursor: pointer; font-weight: bold; transition: all 0.2s; }
        .auth-btn:hover { background: var(--accent-color); border-color: var(--accent-color); }
        .user-welcome { font-size: 0.8rem; color: var(--text-muted); font-weight: bold; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .sidebar { position: fixed; top: 0; right: 0; width: 320px; height: 100%; background-color: var(--card-bg); border-left: 1px solid var(--border-color); z-index: 1500; transform: translateX(100%); visibility: hidden; transition: transform 0.3s ease, visibility 0.3s ease; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; box-shadow: -5px 0 15px rgba(0,0,0,0.5); }
        .sidebar.open { transform: translateX(0); visibility: visible; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; margin-bottom: 20px; flex-shrink: 0; }
        .sidebar-close { font-size: 24px; cursor: pointer; color: var(--text-muted); }
        .sidebar-close:hover { color: var(--accent-color); }
        #sidebarContent { flex: 1; overflow-y: auto; }
        #sidebarFooter { flex-shrink: 0; padding-top: 15px; border-top: 1px solid var(--border-color); display: none; }

        .project-list-title { font-size: 1.1rem; margin: 0; color: #fff; }
        .project-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 15px; }
        .project-card { background-color: #2d2d2d; border-radius: 8px; overflow: hidden; border: 1px solid var(--border-color); cursor: pointer; transition: transform 0.2s; display: flex; flex-direction: column; }
        .project-card:hover { transform: translateY(-2px); border-color: var(--accent-color); }
        .project-thumb { width: 100%; padding-top: 56.25%; position: relative; background: #000; }
        .project-thumb img { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; }
        .project-info { padding: 10px; display: flex; flex-direction: column; gap: 5px; }
        .project-title { font-size: 0.85rem; font-weight: bold; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 2.3em; }
        .project-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }
        .project-date { font-size: 0.7rem; color: var(--text-muted); }
        .btn-delete-proj { background: none; border: none; color: #ff4757; cursor: pointer; font-size: 0.75rem; padding: 2px 5px; }

        .search-section { background-color: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); margin-bottom: 25px; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .search-box input { flex: 1; min-width: 200px; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); background-color: #2d2d2d; color: white; font-size: 1rem; }
        .btn { padding: 0 20px; border-radius: 8px; border: none; font-size: 1rem; font-weight: bold; cursor: pointer; transition: background 0.2s; height: 45px; display: inline-flex; align-items: center; justify-content: center; }
        .btn-search { background-color: var(--accent-color); color: white; flex-grow: 1; }
        .btn-refresh { background-color: #2f3542; color: white; display: none; flex-grow: 1; } 
        
        .filters { display: flex; flex-wrap: wrap; gap: 15px; padding-top: 15px; border-top: 1px solid var(--border-color); }
        .filter-group { display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 140px; }
        .filter-group label { font-size: 0.85rem; color: var(--text-muted); font-weight: bold; }
        .filter-group select { padding: 10px; border-radius: 6px; background-color: #2d2d2d; color: white; border: 1px solid var(--border-color); cursor: pointer; font-size: 0.9rem; width: 100%; box-sizing: border-box; }
        
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; margin-top: 20px; }
        .video-card { background-color: var(--card-bg); border-radius: 10px; overflow: hidden; border: 1px solid var(--border-color); transition: transform 0.2s; cursor: pointer; }
        .video-card:hover { transform: translateY(-3px); }
        .thumbnail-container { position: relative; width: 100%; padding-top: 56.25%; }
        .thumbnail-container img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .video-info { padding: 12px; }
        .video-title { font-size: 0.95rem; font-weight: bold; margin: 0 0 8px 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; }
        .channel-name { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 5px; }
        .video-meta { font-size: 0.75rem; color: var(--text-muted); display: flex; justify-content: space-between; }
        .status-message { text-align: center; font-size: 1.1rem; color: var(--text-muted); margin-top: 40px; width: 100%; } 

        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); backdrop-filter: blur(5px); align-items: center; justify-content: center; padding: 15px; box-sizing: border-box; }
        .modal-content { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; width: 100%; max-width: 500px; padding: 25px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: fadeIn 0.25s ease-out; }
        .modal-content.video-modal { max-width: 640px; }
        .modal-close { position: absolute; top: 12px; right: 18px; color: var(--text-muted); font-size: 28px; font-weight: bold; cursor: pointer; }
        .modal-close:hover { color: var(--accent-color); }
        .modal-player-container { position: relative; width: 100%; padding-top: 56.25%; border-radius: 8px; overflow: hidden; background: #000; margin-bottom: 15px; }
        .modal-player-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .auth-form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .auth-form-group label { font-size: 0.9rem; color: var(--text-muted); }
        .auth-form-group input { padding: 10px; border-radius: 6px; border: 1px solid var(--border-color); background: #2d2d2d; color: white; font-size: 1rem; }
        
        .auth-switch-link { text-align: center; margin-top: 15px; font-size: 0.85rem; color: var(--text-muted); }
        .auth-switch-link a { color: var(--accent-color); text-decoration: none; font-weight: bold; margin-left: 5px; }
        .auth-switch-link a:hover { text-decoration: underline; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .workspace { display: none; background-color: var(--card-bg); border: 2px solid var(--accent-color); border-radius: 12px; padding: 15px; margin-bottom: 30px; }
        .workspace-title { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; margin-bottom: 15px; gap: 10px; }
        .workspace-layout { display: flex; gap: 20px; flex-direction: column; } 
        .video-side { display: flex; flex-direction: column; gap: 15px; width: 100%; }
        .stage-side { display: flex; flex-direction: column; gap: 15px; width: 100%; }
        .player-container { position: relative; width: 100%; padding-top: 56.25%; border-radius: 8px; overflow: hidden; background: #000; }
        .player-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .part-section { background: #1a1a1a; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); }
        .part-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
        .part-tab { padding: 6px 12px; background: #2d2d2d; border: 1px solid var(--border-color); color: white; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: bold; }
        .part-tab.active { background: var(--accent-color); border-color: var(--accent-color); }
        .part-controls { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-small { height: 35px; padding: 0 12px; font-size: 0.8rem; border-radius: 6px; flex: 1; min-width: 100px; }

        .stage-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .dancer-form { display: flex; gap: 6px; width: 100%; }
        .dancer-form input { flex: 1; padding: 8px; border-radius: 6px; border: 1px solid var(--border-color); background: #2d2d2d; color: white; font-size: 0.9rem; }
        .dancer-form .btn-small { flex: none; width: 80px; }
        .size-slider-container { display: flex; align-items: center; gap: 8px; background: #2d2d2d; padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border-color); }
        .size-slider-container span { font-size: 0.8rem; color: var(--text-muted); font-weight: bold; }
        .size-slider-container input[type="range"] { width: 70px; cursor: pointer; accent-color: var(--accent-color); }

        .stage-floor { position: relative; width: 100%; height: 340px; background-color: #1a1a1a; border: 2px solid #444; border-radius: 8px; overflow: hidden; box-sizing: border-box; touch-action: none; background-image: radial-gradient(#333 15%, transparent 16%), radial-gradient(#333 15%, transparent 16%); background-size: 20px 20px; background-position: 0 0, 10px 10px; }
        .stage-floor::before { content: ''; position: absolute; top: 0; bottom: 0; left: 50%; border-left: 1px dashed rgba(255, 71, 87, 0.4); pointer-events: none; }
        .stage-floor::after { content: ''; position: absolute; left: 0; right: 0; top: 50%; border-top: 1px dashed rgba(255, 71, 87, 0.4); pointer-events: none; }

        .dancer-marker { position: absolute; width: var(--dancer-size); height: var(--dancer-size); border-radius: 50%; background-color: var(--accent-color); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: calc(var(--dancer-size) * 0.32); cursor: move; user-select: none; -webkit-user-select: none; box-shadow: 0 4px 10px rgba(0,0,0,0.5); transform: translate(-50%, -50%); border: 2px solid white; touch-action: none; transition: border-color 0.1s, box-shadow 0.1s; }
        /* 🔵 마커 선택 표시 CSS 추가 */
        .dancer-marker.selected { border-color: #00a8ff; box-shadow: 0 0 12px #00a8ff; z-index: 50 !important; }
        .dancer-name-tag { position: absolute; bottom: -22px; white-space: nowrap; background: rgba(0,0,0,0.8); padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; color: #fff; border: 1px solid #444; pointer-events: none; }
        .dancer-delete { position: absolute; top: -4px; right: -4px; width: 18px; height: 18px; background: #fff; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; font-weight: bold; border: 1px solid #000; z-index: 10; }

        /* 🔵 마그네틱 십자선(대칭/정렬 가이드) CSS 추가 */
        .snap-guide-v { position: absolute; top: 0; bottom: 0; width: 1px; border-left: 1.5px dashed #00a8ff; pointer-events: none; z-index: 1; display: none; }
        .snap-guide-h { position: absolute; left: 0; right: 0; height: 1px; border-top: 1.5px dashed #00a8ff; pointer-events: none; z-index: 1; display: none; }

        @media (min-width: 769px) {
            body { padding: 20px; }
            h1 { font-size: 2.5rem; }
            .search-box { flex-wrap: nowrap; }
            .btn-search, .btn-refresh { flex-grow: 0; }
            .workspace-layout { flex-direction: row; }
            .video-side { flex: 1; }
            .stage-side { flex: 1.2; }
            .stage-floor { height: 420px; }
            .dancer-form { width: auto; }
        }
    </style>
</head>
<body>

<div class="top-nav-container">
    <div class="hamburger-menu" onclick="toggleSidebar()">☰</div>
    <div class="auth-status-area" id="authStatusArea">
        <button class="auth-btn" onclick="openModal('loginModal')">로그인/회원가입</button>
    </div>
</div>

<div class="container">
    <header>
        <h1>Dance Finder & Stager</h1>
        <p style="font-size:0.9rem; margin:0; color:var(--text-muted);">안무 영상을 탐색하고 파트별 무대 스태이지 동선을 직접 기획해 보세요.</p>
        <p style="font-size:0.8rem; margin:5px 0 0 0; color:var(--accent-color);">💡 마커를 클릭하여 <b>Ctrl+C / Ctrl+V</b>로 복사 및 붙여넣기가 가능하며, 이동 시 자동으로 대칭선을 잡아줍니다.</p>
    </header>
    
    <main>
        <div class="search-section">
            <div class="search-box">
                <input type="text" id="genreInput" placeholder="춤 장르 입력 (예: K-pop, HipHop)">
                <button class="btn btn-search" onclick="initialSearch()">검색</button>
                <button class="btn btn-refresh" id="refreshBtn" onclick="refreshVideos()">🔄 새로고침</button>
            </div>
            <div class="filters">
                <div class="filter-group">
                    <label for="videoType">동영상 형태</label>
                    <select id="videoType">
                        <option value="all">전체 비디오</option>
                        <option value="shorts">Shorts (쇼츠)</option>
                        <option value="normal">일반 동영상</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="timeRange">기간 및 정렬 조건</label>
                    <select id="timeRange">
                        <option value="today">당일 업로드 (최신순)</option>
                        <option value="week">최근 1주일</option>
                        <option value="month">최근 한 달</option>
                        <option value="year">올해 업로드</option>
                        <option value="allTime">기간 전체</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="regionType">국가 우선순위</label>
                    <select id="regionType">
                        <option value="all">제한 없음</option>
                        <option value="ko">한국 영상 우선</option>
                        <option value="en">외국 영상 우선</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="workspace" id="workspaceContainer">
            <div class="workspace-title">
                <h2 id="activeVideoTitle" style="margin:0; font-size:1.1rem; max-width:55%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">🎬 동선 제작 중</h2>
                <div style="display:flex; gap:8px;">
                    <button class="btn btn-small" id="saveProjectBtn" style="background:#22a6b3; color:white; display:none;" onclick="saveCurrentProject()">💾 프로젝트 클라우드 저장</button>
                    <button class="btn btn-small" style="background:#2f3542; color:white;" onclick="closeWorkspace()">닫기 ✖</button>
                </div>
            </div>
            <div class="workspace-layout">
                <div class="video-side">
                    <div class="player-container">
                        <iframe id="youtubePlayer" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                    </div>
                    <button class="btn" id="mirrorBtn" onclick="toggleMirror()" style="background:#2f3542; color:white; width:100%; height:42px; font-size:0.9rem; border:1px solid var(--border-color);">🪞 영상 좌우반전 (Mirror Off)</button>
                    
                    <div class="part-section">
                        <h3 style="margin-top:0; font-size:1rem; color:var(--accent-color);">📌 파트 시퀀스 타임라인</h3>
                        <div class="part-tabs" id="partTabs"></div>
                        <div class="part-controls">
                            <button class="btn btn-small" style="background:#2f3542; color:white;" onclick="addNewPart()">➕ 파트 추가</button>
                            <button class="btn btn-small" style="background:#333; color:#ff4757; border:1px solid #444;" onclick="deleteCurrentPart()">🗑️ 삭제</button>
                        </div>
                    </div>
                </div>
                <div class="stage-side">
                    <div class="stage-header">
                        <h3 style="margin:0; font-size:1rem;">🕺 STAGE FLOOR</h3>
                        <div class="size-slider-container">
                            <span>마커 크기</span>
                            <input type="range" id="sizeSlider" min="10" max="75" value="44" oninput="changeMarkerSize(this.value)">
                        </div>
                        <div class="dancer-form">
                            <input type="text" id="dancerNameInput" placeholder="댄서 이름/번호" onkeypress="if(event.key==='Enter') addDancer()">
                            <button class="btn btn-small btn-search" onclick="addDancer()">등록</button>
                        </div>
                    </div>
                    <div class="stage-floor" id="stageFloor">
                        <div id="guideV" class="snap-guide-v"></div>
                        <div id="guideH" class="snap-guide-h"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="video-grid" id="videoGrid">
            <div class="status-message">장르를 입력하고 검색을 시작해 주세요!</div>
        </div>
    </main>
</div>

<div id="projectSidebar" class="sidebar">
    <div class="sidebar-header">
        <h3 class="project-list-title">📁 내 프로젝트 보관함 (Cloud)</h3>
        <span class="sidebar-close" onclick="toggleSidebar()">&times;</span>
    </div>
    <div id="sidebarContent"></div>
    <div id="sidebarFooter"></div>
</div>

<div id="previewModal" class="modal">
    <div class="modal-content video-modal">
        <span class="modal-close" onclick="closePreviewModal()">&times;</span>
        <h3 id="modalVideoTitle" style="margin-top:0; margin-bottom:15px; font-size:1.05rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--accent-color);">영상을 불러오는 중...</h3>
        <div class="modal-player-container">
            <iframe id="modalPlayer" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
        <button class="btn btn-search" style="width:100%; height:48px;" onclick="startProjectFromPreview()">🚀 이 영상으로 새 프로젝트 시작하기</button>
    </div>
</div>

<div id="signupModal" class="modal">
    <div class="modal-content">
        <span class="modal-close" onclick="closeModal('signupModal')">&times;</span>
        <h2 style="margin-top:0; color:var(--accent-color); margin-bottom:20px;">회원가입</h2>
        <div class="auth-form-group">
            <label>이메일 계정 (아이디로 사용)</label>
            <input type="email" id="signupId" placeholder="example@email.com">
        </div>
        <div class="auth-form-group">
            <label>비밀번호</label>
            <input type="password" id="signupPw" placeholder="6자리 이상 입력">
        </div>
        <div class="auth-form-group">
            <label>비밀번호 확인</label>
            <input type="password" id="signupPwConfirm" placeholder="비밀번호 한번 더 입력">
        </div>
        <button class="btn btn-search" style="width:100%; margin-top:10px;" onclick="processSignup()">가입 완료</button>
    </div>
</div>

<div id="loginModal" class="modal">
    <div class="modal-content">
        <span class="modal-close" onclick="closeModal('loginModal')">&times;</span>
        <h2 style="margin-top:0; color:var(--accent-color); margin-bottom:20px;">로그인 / 회원가입</h2>
        <div class="auth-form-group">
            <label>이메일 아이디</label>
            <input type="email" id="loginId" placeholder="등록한 이메일 입력">
        </div>
        <div class="auth-form-group">
            <label>비밀번호</label>
            <input type="password" id="loginPw" placeholder="비밀번호 입력">
        </div>
        <button class="btn btn-search" style="width:100%; margin-top:10px;" onclick="processLogin()">로그인</button>
        
        <div class="auth-switch-link">
            계정이 없으신가요? <a href="#" onclick="switchModalToSignup(event)">회원가입하기</a>
        </div>
    </div>
</div>

<script>
    // =================================================================
    // 🛠️ [필수 설정] 여기에 본인의 Firebase 설정값을 입력해 주세요.
    // =================================================================
    const firebaseConfig = {
        apiKey: "AIzaSyCYsx5aqCssXY1kKjeM2gUXabdl9BlGrLM",
        authDomain: "dance-stager.firebaseapp.com",
        projectId: "dance-stager",
        storageBucket: "dance-stager.firebasestorage.app",

    function initialSearch() { nextPageToken = ''; fetchDanceVideos(); }
    function refreshVideos() { fetchDanceVideos(nextPageToken); }

    async function fetchDanceVideos(pageToken = '') {
        const genreInput = document.getElementById('genreInput').value.trim();
        const videoType = document.getElementById('videoType').value;
        const timeRange = document.getElementById('timeRange').value;
        const regionType = document.getElementById('regionType').value;
        const videoGrid = document.getElementById('videoGrid');
        const refreshBtn = document.getElementById('refreshBtn');

        if (!genreInput) { alert('장르를 입력해 주세요!'); return; }
        videoGrid.innerHTML = '<div class="status-message">조건에 맞는 최적의 안무 영상을 탐색 중입니다...</div>';
        
        const searchQuery = `${genreInput} choreography`;
        let publishedAfter = '';
        const now = new Date();
        
        if (timeRange === 'today') { now.setHours(0,0,0,0); publishedAfter = now.toISOString(); } 
        else if (timeRange === 'week') { now.setDate(now.getDate() - 7); publishedAfter = now.toISOString(); } 
        else if (timeRange === 'month') { now.setDate(now.getDate() - 30); publishedAfter = now.toISOString(); } 
        else if (timeRange === 'year') { publishedAfter = `${new Date().getFullYear()}-01-01T00:00:00Z`; }

        const order = (timeRange === 'today') ? 'date' : 'relevance';
        let videoDurationParam = 'any';
        if (videoType === 'shorts') videoDurationParam = 'short';
        else if (videoType === 'normal') videoDurationParam = 'medium';

        let url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(searchQuery)}&type=video&order=${order}&videoDuration=${videoDurationParam}&maxResults=50&key=${API_KEY}`;
        if (publishedAfter) url += `&publishedAfter=${publishedAfter}`;
        if (pageToken) url += `&pageToken=${pageToken}`; 
        if (regionType !== 'all') url += `&relevanceLanguage=${regionType}`;

        try {
            const response = await fetch(url);
            const data = await response.json();
            if (data.error) throw new Error(data.error.message);

            let videos = data.items;
            nextPageToken = data.nextPageToken || ''; 

            if (!videos || videos.length === 0) { videoGrid.innerHTML = '<div class="status-message">검색 결과가 없습니다.</div>'; return; }

            const videoIds = videos.map(item => item.id.videoId).join(',');
            const statsUrl = `https://www.googleapis.com/youtube/v3/videos?part=statistics,contentDetails,snippet&id=${videoIds}&key=${API_KEY}`;
            const statsResponse = await fetch(statsUrl);
            const statsData = await statsResponse.json();
            
            const videoDetailsMap = {};
            statsData.items.forEach(item => {
                videoDetailsMap[item.id] = { 
                    viewCount: parseInt(item.statistics.viewCount || 0), 
                    duration: item.contentDetails.duration,
                    title: item.snippet.title 
                };
            });

            if (videoType === 'shorts') {
                videos = videos.filter(video => {
                    const detail = videoDetailsMap[video.id.videoId];
                    if (!detail) return false;
                    const matches = detail.duration.match(/PT(?:(\d+)M)?(?:(\d+)S)?/);
                    if (!matches) return false;
                    return (parseInt(matches[1] || '0') * 60 + parseInt(matches[2] || '0')) <= 60;
                });
            }

            if (pageToken === '') videoGrid.innerHTML = '';
            
            videos.forEach(video => {
                const videoId = video.id.videoId;
                const title = videoDetailsMap[videoId]?.title || video.snippet.title;
                const channelTitle = video.snippet.channelTitle;
                const thumbnail = video.snippet.thumbnails.medium.url;
                const publishedAt = new Date(video.snippet.publishedAt).toLocaleDateString();
                const viewCount = videoDetailsMap[videoId] ? videoDetailsMap[videoId].viewCount.toLocaleString() : '0';
                const escapedTitle = title.replace(/['"]/g, " ");

                videoGrid.innerHTML += `
                    <div class="video-card" onclick="openPreviewModal('${videoId}', '${escapedTitle}')">
                        <div class="thumbnail-container"><img src="${thumbnail}"></div>
                        <div class="video-info">
                            <div class="video-title">${title}</div>
                            <div class="channel-name">${channelTitle}</div>
                            <div class="video-meta"><span>👁️ ${viewCount}회</span><span>📅 ${publishedAt}</span></div>
                        </div>
                    </div>`;
            });
            refreshBtn.style.display = 'block'; 
        } catch (error) {
            videoGrid.innerHTML = `<div class="status-message" style="color: var(--accent-color);">오류: ${error.message}</div>`;
        }
    }

    // 🔵 마커 선택을 시각적으로 처리하는 함수
    function selectDancer(id) {
        selectedDancerId = id;
        document.querySelectorAll('.dancer-marker').forEach(el => {
            if(el.dataset.id === id) el.classList.add('selected');
            else el.classList.remove('selected');
        });
    }

    // 스테이지 렌더링
    function renderStage() {
        const stageFloor = document.getElementById('stageFloor');
        if (!stageFloor) return;
        
        // 기존 렌더링된 댄서 마커만 깔끔하게 제거 (가이드라인은 남겨둠)
        stageFloor.querySelectorAll('.dancer-marker').forEach(el => el.remove());
        
        choreographyData[currentVideoId].parts[choreographyData[currentVideoId].currentPartIndex].dancers.forEach(dancer => {
            const marker = document.createElement('div');
            // 선택된 아이디면 CSS 클래스 부여
            marker.className = `dancer-marker ${selectedDancerId === dancer.id ? 'selected' : ''}`;
            marker.dataset.id = dancer.id;
            marker.style.left = `${dancer.x}%`; marker.style.top = `${dancer.y}%`;
            marker.innerHTML = `
                ${dancer.name.substring(0, 2)}
                <div class="dancer-name-tag">${dancer.name}</div>
                <div class="dancer-delete">×</div>
            `;
            marker.querySelector('.dancer-delete').onpointerdown = (e) => { e.stopPropagation(); deleteDancer(dancer.id); };
            bindDragEvent(marker, dancer.id);
            stageFloor.appendChild(marker);
        });
    }

    // 🔵 마그네틱/대칭 스냅이 결합된 드래그 앤 드롭 엔진
    function bindDragEvent(element, dancerId) {
        element.onpointerdown = function(event) {
            if(event.target.className === 'dancer-delete') return;
            event.preventDefault();
            element.setPointerCapture(event.pointerId);
            
            // 드래그 시작 시 해당 마커를 선택 상태로 전환
            selectDancer(dancerId);

            const stageFloor = document.getElementById('stageFloor');
            const rect = stageFloor.getBoundingClientRect();
            
            // 가이드라인 엘리먼트 픽업
            const guideV = document.getElementById('guideV');
            const guideH = document.getElementById('guideH');
            
            const currentPart = choreographyData[currentVideoId].parts[choreographyData[currentVideoId].currentPartIndex];

            function moveAt(clientX, clientY) {
                let percentX = ((clientX - rect.left) / rect.width) * 100;
                let percentY = ((clientY - rect.top) / rect.height) * 100;
                
                let snappedX = false, snappedY = false;
                const snapThreshold = 2.5; // 2.5% 거리 내에 들어오면 자석처럼 스냅 작동

                // 1) 10% 단위 그리드 스냅 연산
                for(let i=0; i<=100; i+=10) {
                    if(!snappedX && Math.abs(percentX - i) < snapThreshold) { percentX = i; snappedX = true; }
                    if(!snappedY && Math.abs(percentY - i) < snapThreshold) { percentY = i; snappedY = true; }
                }

                // 2) 스테이지 위 다른 마커와의 정렬 & 대칭 스냅 연산
                currentPart.dancers.forEach(other => {
                    if(other.id === dancerId) return;
                    
                    // 가로/세로선 상호 동일 선상 정렬 스냅
                    if(!snappedX && Math.abs(percentX - other.x) < snapThreshold) { percentX = other.x; snappedX = true; }
                    if(!snappedY && Math.abs(percentY - other.y) < snapThreshold) { percentY = other.y; snappedY = true; }
                    
                    // 중앙 기준 완벽 대칭점 스냅 연산 (100 - 타겟값)
                    let symX = 100 - other.x;
                    let symY = 100 - other.y;
                    if(!snappedX && Math.abs(percentX - symX) < snapThreshold) { percentX = symX; snappedX = true; }
                    if(!snappedY && Math.abs(percentY - symY) < snapThreshold) { percentY = symY; snappedY = true; }
                });

                // 스테이지 밖으로 나가지 않도록 한계값 지정
                percentX = Math.max(0, Math.min(percentX, 100));
                percentY = Math.max(0, Math.min(percentY, 100));

                // 돔에 즉시 반영
                element.style.left = `${percentX}%`;
                element.style.top = `${percentY}%`;

                // 십자 가이드라인 시각화
                if(snappedX) { guideV.style.left = `${percentX}%`; guideV.style.display = 'block'; } else { guideV.style.display = 'none'; }
                if(snappedY) { guideH.style.top = `${percentY}%`; guideH.style.display = 'block'; } else { guideH.style.display = 'none'; }

                // 데이터 갱신
                const dancer = currentPart.dancers.find(d => d.id === dancerId);
                if(dancer) { dancer.x = percentX; dancer.y = percentY; }
            }

            function onPointerMove(event) { moveAt(event.clientX, event.clientY); }
            document.addEventListener('pointermove', onPointerMove);
            document.addEventListener('pointerup', function onPointerUp(e) {
                document.removeEventListener('pointermove', onPointerMove);
                document.removeEventListener('pointerup', onPointerUp);
                
                // 마우스 놓으면 가이드라인 제거 후 자동 저장
                guideV.style.display = 'none';
                guideH.style.display = 'none';
                saveLocalData(); 
                
                try { element.releasePointerCapture(e.pointerId); } catch(err) {}
            });
        };
        element.ondragstart = function() { return false; };
    }

    // 🔵 마커 복사/붙여넣기 및 단축키(키보드) 제어
    window.addEventListener('keydown', (e) => {
        // 입력창에서는 시스템 단축키 무시
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        if (!currentVideoId) return; // 작업실이 안 켜져있으면 무시

        const currentPart = choreographyData[currentVideoId].parts[choreographyData[currentVideoId].currentPartIndex];

        // [Ctrl + C] 또는 [Cmd + C] - 복사
        if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'c') {
            if (selectedDancerId) {
                const target = currentPart.dancers.find(d => d.id === selectedDancerId);
                if (target) {
                    copiedDancer = { name: target.name }; // 이름 등 속성 복사
                }
            }
        }
        
        // [Ctrl + V] 또는 [Cmd + V] - 붙여넣기
        if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'v') {
            if (copiedDancer) {
                const newDancer = {
                    id: Date.now() + Math.random().toString(36).substr(2, 5),
                    name: copiedDancer.name,
                    x: 50, y: 50 // 중앙에 붙여넣기
                };
                currentPart.dancers.push(newDancer);
                saveLocalData();
                selectDancer(newDancer.id); // 방금 붙여넣은 댄서 자동 선택
                renderStage();
            }
        }
        
        // [Delete] 또는 [Backspace] - 선택한 마커 삭제
        if (e.key === 'Delete' || e.key === 'Backspace') {
            if (selectedDancerId) {
                deleteDancer(selectedDancerId);
            }
        }
    });

</script>
